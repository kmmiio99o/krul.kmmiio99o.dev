name: Deploy to dist branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy to dist branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/deploy
          cp -r dist/* /tmp/deploy/

          git fetch origin dist || true

          if git ls-remote --exit-code --heads origin dist 2>/dev/null; then
            git stash --include-untracked || true
            git switch -c dist origin/dist
          else
            git switch --orphan dist
          fi

          git rm -rf . 2>/dev/null || true
          git clean -fdx
          cp -r /tmp/deploy/* .
          git add -f .
          git commit -m "Deploy: ${GITHUB_SHA::7}"
          git push origin dist
